# バックエンドのビルドとテストを PR / master への push で自動実行する。
# OpenAPI 生成は backend の Maven がリポジトリルートの openapi/ を参照するため、checkout は常にリポジトリルートで行う。
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened] # PR が作成された、更新された、または再オープンされた場合に実行
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-verify: #ジョブのID
    name: Backend (Maven verify) #ジョブの名前
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 #リポジトリをクローンする

      - name: Set up JDK 25
        uses: actions/setup-java@v4 #JDKをセットアップする
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run Maven verify
        run: mvn -B -ntp verify
