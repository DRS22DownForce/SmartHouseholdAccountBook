# PR で新規に導入された依存の脆弱性のみを検出する（ベースブランチとの差分）。
name: OSV-Scanner PR Scan

on:
  pull_request:
    branches: [master]
  merge_group:
    branches: [master]

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  scan-pr:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8
    with:
      scan-args: |-
        --recursive
        backend/
        frontend-nextjs/
