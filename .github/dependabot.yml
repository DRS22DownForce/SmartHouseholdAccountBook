# 依存関係のバージョンアップ PR を週次で自動作成（セキュリティ関連の検知とも連携しやすい）
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend-nextjs"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
