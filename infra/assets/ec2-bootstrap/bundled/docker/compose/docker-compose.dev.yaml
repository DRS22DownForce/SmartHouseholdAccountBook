# ========================================
# 開発環境用 Docker Compose 設定
# MySQLのみ起動（Spring Bootはローカルで実行）
# ========================================

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-dev
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_FLYWAY_USER: ${MYSQL_FLYWAY_USER}
      MYSQL_FLYWAY_PASSWORD: ${MYSQL_FLYWAY_PASSWORD}
      MYSQL_APP_USER: ${MYSQL_APP_USER}
      MYSQL_APP_PASSWORD: ${MYSQL_APP_PASSWORD}
    volumes:
      # データ永続化
      - mysql_dev_data:/var/lib/mysql
      # MySQL設定
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 5s
      timeout: 5s
      retries: 20
      # ボリューム削除後の初回初期化では mysqld 起動に時間がかかるため、失敗を retries に数えない猶予を設ける
      start_period: 60s

volumes:
  mysql_dev_data:
    name: smart_household_mysql_dev_data

