# ========================================
# 本番プロファイル（EC2 single-host-prod 等）
# ========================================

spring.devtools.restart.enabled=false

spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.orm.jdbc.bind=ERROR

logging.level.root=WARN
logging.level.com.smarthouseholdaccountbook.backend=WARN
logging.level.org.springframework=WARN

# 本番ログにスタックトレースを出さない（例外クラス名とメッセージのみ）
logging.exception-conversion-word=%nopex

# 未処理エラー応答に内部情報を含めない
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
