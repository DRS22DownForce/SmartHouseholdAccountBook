# ========================================
# 単一ホスト用ベース: MySQL + Spring Boot（同一 Docker ネットワーク）
# Flyway がスキーマの正。Hibernate は validate のみ。
#
# デプロイ前確認: + docker-compose.single-host.local.yaml（JDBC は .env と prod 同一）
# 本番（EC2）: + docker-compose.single-host.prod.yaml（local は付けない）
# ========================================

services:
  mysql:
    image: mysql:8.0
    container_name: smart_household_mysql_single
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_FLYWAY_USER: ${MYSQL_FLYWAY_USER}
      MYSQL_FLYWAY_PASSWORD: ${MYSQL_FLYWAY_PASSWORD}
      MYSQL_APP_USER: ${MYSQL_APP_USER}
      MYSQL_APP_PASSWORD: ${MYSQL_APP_PASSWORD}
    volumes:
      - mysql_data_single:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      # ボリューム削除後の初回初期化では mysqld 起動に時間がかかるため、失敗を retries に数えない猶予を設ける
      start_period: 60s
    networks:
      - app-network

  backend:
    build:
      context: ./
      dockerfile: backend/Dockerfile
    container_name: smart_household_backend_single
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # JDBC URL は .env の SPRING_DATASOURCE_URL_PROD を正とする（local / prod で同一）
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL_PROD}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_APP_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_APP_PASSWORD}
      SPRING_FLYWAY_USER: ${MYSQL_FLYWAY_USER}
      SPRING_FLYWAY_PASSWORD: ${MYSQL_FLYWAY_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      COGNITO_JWK_SET_URL: ${COGNITO_JWK_SET_URL}
      COGNITO_ISSUER_URL: ${COGNITO_ISSUER_URL}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_URL: ${OPENAI_API_URL:-https://api.openai.com/v1/chat/completions}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mysql_data_single:
    name: smart_household_mysql_data_single

networks:
  app-network:
    name: smart_household_app_network_single
    driver: bridge
