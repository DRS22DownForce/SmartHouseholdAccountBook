# ========================================
# デプロイ前の通し確認用（base + 本ファイル）
# - JDBC / Flyway / validate は prod と同一（.env の SPRING_DATASOURCE_URL_PROD）
# - 差分: MySQL を 127.0.0.1:3306 で公開、Spring プロファイル dev（SQL 文ログ可・PII はコード側で抑制）
# ========================================

services:
  mysql:
    ports:
      - "127.0.0.1:3306:3306"

  backend:
    environment:
      SPRING_PROFILES_ACTIVE: dev
