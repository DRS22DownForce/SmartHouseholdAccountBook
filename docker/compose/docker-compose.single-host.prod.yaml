# ========================================
# 本番寄せ上書き（EC2 等）
# - バックエンドは 127.0.0.1:8080 のまま → ホスト上の Nginx が
#   proxy_pass http://127.0.0.1:8080 で TLS 終端する想定
# - セキュリティグループで 8080 は開けず、443/80 のみ公開
# - インターネットに 8080 を直接晒す場合は ports を
#   "8080:8080" に変更する（非推奨寄り）
# ========================================

services:
  backend:
    environment:
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
